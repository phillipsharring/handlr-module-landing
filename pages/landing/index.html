<layout name="landing" title="Coming Soon" />

<div class="min-h-screen flex items-center justify-center px-6">
    <div class="text-center max-w-md">
        <h1 class="text-4xl font-bold mb-4">Coming Soon</h1>
        <p class="text-lg text-slate-600 mb-8">Sign up to be notified when we launch.</p>
        <form id="email-capture-form" class="flex gap-2">
            <input type="email" name="email" required placeholder="you@example.com"
                   class="flex-1 px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500" />
            <button type="submit"
                    class="px-6 py-3 bg-indigo-600 text-white font-semibold rounded-lg hover:bg-indigo-500 transition-colors">
                Notify Me
            </button>
        </form>
        <p id="email-capture-msg" class="mt-4 text-sm hidden"></p>
    </div>
</div>
